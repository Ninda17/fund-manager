# ===============================
# PIPELINE STAGES
# ===============================
stages:
  - install
  - test

# ===============================
# GLOBAL VARIABLES
# ===============================
variables:
  NODE_VERSION: "20"
  MONGODB_VERSION: "7.0"

# ===============================
# DEFAULT JOB CONFIG
# ===============================
default:
  image: node:${NODE_VERSION}-alpine
  before_script:
    - apk add --no-cache git
    - node --version
    - npm --version

# ===============================
# INSTALL STAGE
# ===============================
install_backend:
  stage: install
  script:
    - echo "Installing backend dependencies..."
    - cd backend
    - npm ci
    - echo "Backend dependencies installed successfully"
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 hour

install_frontend:
  stage: install
  script:
    - echo "Installing frontend dependencies..."
    - cd frontend
    - npm ci
    - echo "Frontend dependencies installed successfully"
  artifacts:
    paths:
      - frontend/node_modules/
    expire_in: 1 hour

# ===============================
# TEST STAGE – BACKEND UNIT TESTS
# ===============================
test_backend_unit:
  stage: test
  dependencies:
    - install_backend
  script:
    - echo "Running backend security audit (read-only)..."
    - cd backend
    - npm audit --audit-level=high || true
    - echo "Running backend unit tests..."
    - npm run test:unit -- --coverage
    - echo "Backend unit tests completed"
  artifacts:
    paths:
      - backend/coverage/
    when: always
    expire_in: 1 week
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

# ===============================
# TEST STAGE – BACKEND INTEGRATION TESTS
# ===============================
test_backend_integration:
  stage: test
  dependencies:
    - install_backend
  services:
    - name: mongo:${MONGODB_VERSION}
      alias: mongo
  variables:
    MONGO_URL: "mongodb://mongo:27017/vehicle-maintenance-test"
    JWT_SECRET: "test-jwt-secret"
    NODE_ENV: "test"
  script:
    - echo "Waiting for MongoDB to be ready..."
    - apk add --no-cache netcat-openbsd || true
    - |
      for i in {1..30}; do
        if nc -z mongo 27017; then
          echo "MongoDB is ready"
          break
        fi
        echo "Waiting for MongoDB ($i/30)"
        sleep 1
      done
    - cd backend
    - echo "Running backend integration tests..."
    - npm run test:integration -- --coverage
  artifacts:
    paths:
      - backend/coverage/
    when: always
    expire_in: 1 week
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

# ===============================
# TEST STAGE – FRONTEND UNIT TESTS
# ===============================
test_frontend_unit:
  stage: test
  dependencies:
    - install_frontend
  script:
    - echo "Running frontend security audit (read-only)..."
    - cd frontend
    - npm audit --audit-level=high || true
    - echo "Running frontend unit tests..."
    - npm run test:unit -- --coverage
    - echo "Frontend unit tests completed"
  artifacts:
    paths:
      - frontend/coverage/
    when: always
    expire_in: 1 week
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
